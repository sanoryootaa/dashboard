<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root {
  --bg: #fff;
  --card: #f2f2f2;
  --tx: #000;
  --sub: #999;
  --urg: #c82020;
  --urg-bg: rgba(200,32,32,.12);
}
[data-t="dark"] {
  --bg: #000;
  --card: #1a1a1c;
  --tx: #fff;
  --sub: #777;
  --urg-bg: rgba(200,32,32,.22);
}
html, body { background: var(--bg); }
body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 500;
  font-size: 15px;
  color: var(--tx);
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
}

.c1 { --cc: #c89820; }
.c2 { --cc: #b85a28; }
.c3 { --cc: #3d8828; }
.c4 { --cc: #1868a8; }
.c5 { --cc: #7038a0; }
[data-t="dark"] .c1 { --cc: #dab030; }
[data-t="dark"] .c2 { --cc: #d07040; }
[data-t="dark"] .c3 { --cc: #58a838; }
[data-t="dark"] .c4 { --cc: #3090d0; }
[data-t="dark"] .c5 { --cc: #9858c0; }

button:active, .card:active, .tt-row:active, .sd-cell:active { opacity: .5; }

.hdr {
  position: sticky; top: 0; z-index: 40;
  background: var(--bg);
  padding: 48px 20px 12px;
  display: flex; justify-content: space-between; align-items: flex-end;
}
.hdr-date { font-size: 13px; font-weight: 500; color: var(--sub); }
.hdr-title { font-size: 28px; font-weight: 700; }

.icon-btn {
  width: 36px; height: 36px; border-radius: 12px;
  background: var(--card); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--sub);
}

.sec { padding: 0 20px; margin-bottom: 16px; }
.sec-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.sec-t { font-size: 17px; font-weight: 700; }
.sec-link { font-size: 11px; font-weight: 500; color: var(--sub); background: none; border: none; cursor: pointer; font-family: inherit; }

.sec-tog {
  width: 32px; height: 32px; border-radius: 12px;
  background: var(--card); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; color: var(--sub);
}

.dl-list { display: flex; flex-direction: column; gap: 6px; }
.dl-card {
  background: var(--card); border-radius: 12px;
  border-left: 4px solid var(--cc); overflow: hidden; cursor: pointer;
}
.dl-card.urg { background: var(--urg-bg); }
.dl-main {
  display: grid; grid-template-columns: 52px 1fr auto;
  align-items: center; gap: 10px;
  padding: 10px 12px 10px 8px;
}
.dl-days { display: block; font-size: 22px; font-weight: 700; color: var(--cc); line-height: 1.1; text-align: center; }
.dl-unit { display: block; font-size: 11px; font-weight: 500; color: var(--sub); text-align: center; }
.dl-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.dl-meta { font-size: 13px; font-weight: 500; color: var(--sub); }
.dl-time { opacity: 0.6; }

.accordion { max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; }
.accordion.open { max-height: 600px; }

.detail-panel { padding: 8px 12px 12px; }
.detail-sep { height: 1px; background: var(--card); margin-bottom: 10px; }
.d-input, .d-date, .d-time, .d-textarea {
  width: 100%; background: var(--bg); border: none; border-radius: 12px;
  padding: 0 12px; height: 36px;
  font-size: 15px; font-weight: 500; color: var(--tx); font-family: inherit;
  margin-bottom: 6px; outline: none;
}
.d-textarea { height: auto; padding: 10px 12px; resize: none; }
.d-row { display: flex; gap: 6px; }
.d-row .d-date, .d-row .d-time { flex: 1; }
.urg-row { margin-bottom: 6px; }
.urg-lbl { font-size: 11px; font-weight: 500; color: var(--sub); display: flex; justify-content: space-between; margin-bottom: 4px; }
input[type="range"] { width: 100%; accent-color: var(--tx); }
.del-btn { width: 100%; height: 36px; border-radius: 12px; background: none; border: none; cursor: pointer; font-size: 15px; font-weight: 700; color: var(--urg); font-family: inherit; }

.cat-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.cat-chip {
  padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700;
  background: var(--cc); color: #fff; border: 1.5px solid transparent;
  cursor: pointer; font-family: inherit; opacity: .35;
}
.cat-chip.sel { opacity: 1; border-color: var(--tx); }

.tt-row {
  display: grid; grid-template-columns: 34px 1fr auto;
  align-items: center; gap: 8px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--card);
  cursor: pointer;
}
.tt-chk {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--cc); flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.tt-chk.done { background: var(--cc); border-color: var(--cc); }
.tt-chk.done::after {
  content: ''; display: block; width: 8px; height: 5px;
  border-left: 2px solid #fff; border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
}
.tt-title { font-size: 15px; font-weight: 500; }
.tt-sub { font-size: 11px; font-weight: 500; color: var(--sub); margin-top: 1px; }
.tt-badge {
  font-size: 11px; font-weight: 700;
  background: var(--card); color: var(--sub);
  padding: 3px 8px; border-radius: 6px; white-space: nowrap; flex-shrink: 0;
}
.tt-badge.urg { background: var(--urg-bg); color: var(--urg); }
.tt-badge.over { background: var(--urg); color: #fff; }

.subs-area {
  max-height: 0; overflow: hidden;
  transition: max-height 0.2s ease-out;
  padding: 0 20px;
}
.subs-area.open { max-height: 400px; padding-bottom: 6px; }
.sub-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid var(--card); }
.sub-chk {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid var(--sub); flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.sub-chk.done { background: var(--sub); }
.sub-chk.done::after { content: ''; display: block; width: 6px; height: 4px; border-left: 1.5px solid var(--bg); border-bottom: 1.5px solid var(--bg); transform: rotate(-45deg) translateY(-1px); }
.sub-title { font-size: 13px; font-weight: 500; flex: 1; }
.sub-title.done { text-decoration: line-through; color: var(--sub); }
.add-sub-btn { font-size: 13px; font-weight: 500; color: var(--sub); background: none; border: none; cursor: pointer; padding: 6px 0; font-family: inherit; width: 100%; text-align: left; }

.tt-detail { max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; padding: 0 20px; background: var(--bg); }
.tt-detail.open { max-height: 600px; padding: 6px 20px 12px; }

.done-hdr { padding: 10px 20px; font-size: 13px; font-weight: 700; color: var(--sub); cursor: pointer; display: flex; align-items: center; gap: 6px; }
.done-list { max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; }
.done-list.open { max-height: 2000px; }
.done-row .tt-title { text-decoration: line-through; opacity: .5; }

.strip-wrap { overflow-x: auto; scrollbar-width: none; padding: 0 20px 12px; }
.strip-wrap::-webkit-scrollbar { display: none; }
.strip { display: flex; gap: 6px; }
.sd-cell {
  min-width: 52px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 4px 10px; border-radius: 12px; cursor: pointer;
}
.sd-cell.today-c { background: #000; }
[data-t="dark"] .sd-cell.today-c { background: #fff; }
.sd-cell.sel-c { background: var(--card); }
.sd-dow { font-size: 11px; font-weight: 500; color: var(--sub); }
.sd-num { font-size: 15px; font-weight: 500; margin-top: 2px; }
.sd-cell.today-c .sd-dow, .sd-cell.today-c .sd-num { color: #fff; font-weight: 700; }
[data-t="dark"] .sd-cell.today-c .sd-dow, [data-t="dark"] .sd-cell.today-c .sd-num { color: #000; }
.sd-dots { display: flex; gap: 2px; margin-top: 3px; height: 5px; align-items: center; }
.sd-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

.tl { position: relative; padding: 0 20px; }
.tl::before { content: ''; position: absolute; left: 28px; top: 0; bottom: 0; width: 1px; background: var(--card); }
.tb { position: relative; padding: 0 0 12px 20px; }
.tb-time { font-size: 11px; font-weight: 500; color: var(--sub); margin-bottom: 4px; }
.tb-ev {
  display: grid; grid-template-columns: 6px 1fr auto;
  align-items: center; gap: 8px;
  padding: 10px 12px; background: var(--card); border-radius: 12px;
}
.tb-dot { width: 6px; height: 6px; border-radius: 3px; background: var(--cc); flex-shrink: 0; }
.tb-ev-t { font-size: 13px; font-weight: 500; }
.tb-ev-sub { font-size: 11px; font-weight: 500; color: var(--sub); margin-top: 1px; }
.tb-dur { font-size: 11px; font-weight: 500; color: var(--sub); white-space: nowrap; }
.tl-empty { font-size: 13px; font-weight: 500; color: var(--sub); padding: 12px 0; text-align: center; }

.filter-row { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 0 20px 12px; }
.filter-row::-webkit-scrollbar { display: none; }
.f-chip { height: 32px; padding: 0 14px; border-radius: 16px; font-size: 13px; font-weight: 500; color: var(--sub); background: transparent; border: none; cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0; }
.f-chip.on { background: var(--card); color: var(--tx); font-weight: 700; }

.tk-card { background: var(--card); border-radius: 12px; border-left: 4px solid var(--cc); margin: 0 20px 6px; overflow: hidden; cursor: pointer; }
.tk-main { display: grid; grid-template-columns: 34px 1fr auto; align-items: center; gap: 8px; padding: 10px 12px 10px 8px; }
.tk-subs { max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; padding: 0 10px; }
.tk-subs.open { max-height: 400px; padding-bottom: 6px; }
.tk-detail { max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; padding: 0 10px; }
.tk-detail.open { max-height: 600px; padding: 0 10px 12px; }

.b-card { background: var(--card); border-radius: 12px; margin: 0 20px 12px; padding: 10px 12px; }
.shift-row { display: grid; grid-template-columns: 36px 1fr 60px; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--bg); }
.shift-row:last-child { border-bottom: none; }
.shift-dow { font-size: 17px; font-weight: 700; }
.shift-time { font-size: 13px; font-weight: 500; color: var(--sub); }
.tog-sw { position: relative; width: 51px; height: 31px; background: var(--sub); border-radius: 16px; cursor: pointer; transition: background 0.2s; border: none; justify-self: end; flex-shrink: 0; }
.tog-sw.on { background: #c89820; }
[data-t="dark"] .tog-sw.on { background: #dab030; }
.tog-sw::after { content: ''; position: absolute; top: 2px; left: 2px; width: 27px; height: 27px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
.tog-sw.on::after { transform: translateX(20px); }
.b-stats { background: var(--card); border-radius: 12px; margin: 0 20px 12px; padding: 10px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 700; }
.stat-l { font-size: 11px; font-weight: 500; color: var(--sub); margin-top: 2px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; margin-bottom: 10px; }
.cal-nav-btn { width: 36px; height: 36px; background: var(--card); border: none; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: 700; color: var(--tx); display: flex; align-items: center; justify-content: center; font-family: inherit; }
.cal-mo { font-size: 17px; font-weight: 700; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; padding: 0 14px 12px; }
.cal-dow { text-align: center; font-size: 11px; font-weight: 500; color: var(--sub); padding: 6px 0; }
.cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 500; position: relative; }
.cal-day.today-d { background: #000; color: #fff; font-weight: 700; }
[data-t="dark"] .cal-day.today-d { background: #fff; color: #000; }
.cal-day.sel-d { background: var(--card); }
.cal-day.other-m { opacity: .3; }
.cal-day-dot { position: absolute; bottom: 2px; width: 4px; height: 4px; border-radius: 50%; background: #c89820; }
[data-t="dark"] .cal-day-dot { background: #dab030; }
.b-action { background: var(--card); border-radius: 12px; margin: 0 20px 12px; padding: 10px 12px; }
.b-action-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.b-action-btns { display: flex; gap: 6px; margin-bottom: 6px; }
.b-act-btn { flex: 1; height: 36px; border-radius: 12px; background: var(--bg); border: none; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--sub); font-family: inherit; }
.b-act-btn.on { background: var(--tx); color: var(--bg); }
.t-inputs { display: flex; gap: 6px; margin-top: 6px; }
.t-inp { flex: 1; height: 36px; border-radius: 12px; background: var(--bg); border: none; font-size: 15px; font-weight: 500; color: var(--tx); padding: 0 10px; font-family: inherit; outline: none; }

.fib-outer { position: fixed; left: 0; right: 0; bottom: calc(60px + env(safe-area-inset-bottom)); z-index: 100; padding: 0 20px; }
.fib-panel { background: var(--card); border-radius: 12px 12px 0 0; padding: 12px; transform: translateY(100%); transition: transform 0.2s ease-out, opacity 0.2s ease-out; opacity: 0; pointer-events: none; }
.fib-panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
.fib-bar { height: 44px; background: var(--card); border-radius: 12px; display: flex; align-items: center; gap: 10px; padding: 0 14px; cursor: pointer; position: relative; z-index: 1; }
.fib-plus { color: var(--sub); display: flex; }
.fib-plus svg { width: 18px; height: 18px; }
#fibInput { flex: 1; background: none; border: none; outline: none; font-size: 15px; font-weight: 500; color: var(--tx); font-family: inherit; }
#fibInput::placeholder { color: var(--sub); }
.fib-bd { position: fixed; inset: 0; z-index: 90; display: none; }
.fib-bd.active { display: block; }
.fib-cat-chips { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 8px; flex-wrap: nowrap; }
.fib-cat-chips::-webkit-scrollbar { display: none; }
.fib-date-row { display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
.fib-date-row::-webkit-scrollbar { display: none; }
.fib-date-btn { height: 36px; padding: 0 12px; border-radius: 12px; background: var(--bg); border: none; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--sub); font-family: inherit; flex-shrink: 0; }
.fib-date-btn.on { background: var(--tx); color: var(--bg); }
.fib-time-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.fib-time-lbl { font-size: 11px; font-weight: 500; color: var(--sub); white-space: nowrap; }
.fib-time-inp { flex: 1; height: 36px; border-radius: 12px; background: var(--bg); border: none; font-size: 15px; font-weight: 500; color: var(--tx); padding: 0 12px; font-family: inherit; outline: none; }
.fib-type-row { display: flex; gap: 6px; margin-bottom: 8px; }
.fib-type-btn { flex: 1; height: 36px; border-radius: 12px; background: var(--bg); border: none; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--sub); font-family: inherit; }
.fib-type-btn.on { background: var(--tx); color: var(--bg); }
.fib-add-btn { width: 100%; height: 36px; border-radius: 12px; background: var(--tx); color: var(--bg); border: none; cursor: pointer; font-size: 15px; font-weight: 700; font-family: inherit; }

.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; display: flex; justify-content: space-around; align-items: center; background: var(--bg); border-top: 1px solid var(--card); padding: 4px 0; padding-bottom: calc(4px + env(safe-area-inset-bottom)); z-index: 50; }
.nv { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 70px; min-height: 44px; justify-content: center; font-size: 11px; font-weight: 500; color: var(--sub); background: none; border: none; cursor: pointer; font-family: inherit; }
.nv.on { color: var(--tx); font-weight: 700; }
.nv svg { width: 22px; height: 22px; }
.ico-on { display: none; }
.nv.on .ico-off { display: none; }
.nv.on .ico-on { display: block; }

.s-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s ease-out; }
.s-bg.open { opacity: 1; pointer-events: auto; }
.s-pan { position: fixed; top: 0; right: -300px; width: 300px; height: 100%; background: var(--bg); z-index: 201; transition: right 0.2s ease-out; padding: 56px 20px 20px; overflow-y: auto; }
.s-pan.open { right: 0; }
.s-close { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 12px; background: var(--card); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--sub); }
.s-close svg { width: 16px; height: 16px; }
.s-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
.s-sec { margin-bottom: 20px; }
.s-lbl { font-size: 11px; font-weight: 500; color: var(--sub); margin-bottom: 6px; }
.s-row { display: flex; justify-content: space-between; align-items: center; }
.s-theme-row { display: flex; gap: 6px; }
.s-t-btn { flex: 1; height: 36px; border-radius: 12px; background: var(--card); border: none; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--tx); font-family: inherit; }
.s-t-btn.on { background: var(--tx); color: var(--bg); font-weight: 700; }

.tab-page { min-height: 100vh; }
.spacer { height: 120px; }

@keyframes chkPop { from { transform: scale(0); } to { transform: scale(1); } }
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div>
    <div id="hdrDate" class="hdr-date"></div>
    <div id="hdrTitle" class="hdr-title">今日</div>
  </div>
  <button class="icon-btn" onclick="openSet()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
  </button>
</div>

<!-- Tab wrap -->
<div style="position:relative">
  <!-- TODAY -->
  <div class="tab-page" id="pg-today">
    <div class="sec">
      <div class="sec-hdr">
        <div class="sec-t">締め切り</div>
        <button class="sec-tog" id="dlTogBtn" onclick="togDL()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
        </button>
      </div>
      <div id="dlWrap">
        <div id="dlList" class="dl-list"></div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-hdr">
        <div class="sec-t">今週のタスク</div>
        <button class="sec-link" onclick="swTab('tasks',event)">すべて →</button>
      </div>
    </div>
    <div id="ttList"></div>
    <div class="sec" style="margin-top:16px">
      <div class="sec-hdr"><div class="sec-t">スケジュール</div></div>
    </div>
    <div class="strip-wrap"><div class="strip" id="strip"></div></div>
    <div class="tl" id="tlToday"></div>
    <div class="spacer"></div>
  </div>

  <!-- TASKS -->
  <div class="tab-page" id="pg-tasks" style="display:none">
    <div style="padding-top:8px">
      <div class="filter-row">
        <button class="f-chip on" data-cat="all" onclick="setFlt('all')">すべて</button>
        <button class="f-chip c1" data-cat="1" onclick="setFlt('1')">バイト</button>
        <button class="f-chip c2" data-cat="2" onclick="setFlt('2')">大学</button>
        <button class="f-chip c3" data-cat="3" onclick="setFlt('3')">制作</button>

    <svg class="ico-on" width="22" height="22" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" fill="currentColor"/><path d="M8 12l3 3 5-5" stroke="var(--bg)" stroke-width="2" fill="none"/></svg>

    <svg class="ico-on" width="22" height="22" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="3" fill="currentColor"/><path d="M16 7V5a2 2 0 00-4 0v2" stroke="var(--bg)" stroke-width="1.6" fill="none"/></svg>

<script>
'use strict';

const TODAY = new Date();
const pad = n => String(n).padStart(2,'0');
const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const DOW = ['日','月','火','水','木','金','土'];
const parseD = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };
const fmtD = d => `${d.getMonth()+1}月${d.getDate()}日(${DOW[d.getDay()]})`;
const fmtDL = d => `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${DOW[d.getDay()]})`;
const dU = toStr => Math.ceil((parseD(toStr) - new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()))/864e5);
const dur = (s,e) => {
  if(!s||!e) return '';
  const [sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
  const m=(eh*60+em)-(sh*60+sm);
  return m<=0?'':m>=60?`${Math.floor(m/60)}h${m%60?m%60+'m':''}`:m+'分';
};
const cn = c => ['','バイト','大学','制作','プライベート','活動'][c]||'';
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
let nid = 9000;
const newId = () => ++nid;

const DEF_TASKS = [
  {id:101,title:'ポートフォリオに「言葉の瓶」追加',c:3,due:'2026-03-23',dt:'23:59',done:false,sub:[],memo:'',ud:2},
  {id:102,title:'授賞式の交通手段確認',c:5,due:'2026-03-25',dt:'23:59',done:false,sub:[],memo:'',ud:2},
  {id:103,title:'DaVinci カラグレ書き出し確認',c:3,due:'2026-03-24',dt:'23:59',done:false,sub:[],memo:'',ud:2},
  {id:104,title:'4年次ゼミ希望届提出',c:2,due:'2026-04-02',dt:'12:00',done:false,sub:[],memo:'',ud:2},
  {id:105,title:'ES提出 (A社)',c:2,due:'2026-04-08',dt:'23:59',done:false,sub:[],memo:'',ud:2},
  {id:106,title:'シフト来月分提出',c:1,due:'2026-03-28',dt:'23:59',done:false,sub:[],memo:'',ud:2},
];
const DEF_EVENTS = [
  {id:1,title:'Blender アニメーション作業',c:3,date:'2026-03-27',s:'13:00',e:'16:00'},
  {id:2,title:'映像基礎演習',c:2,date:'2026-03-27',s:'10:00',e:'12:00'},
  {id:3,title:'造形原論',c:2,date:'2026-03-28',s:'13:00',e:'14:30'},
  {id:4,title:'CG演習',c:2,date:'2026-03-28',s:'10:00',e:'12:00'},
  {id:5,title:'ACジャパン広告学生賞 授賞式',c:5,date:'2026-03-26',s:'14:00',e:'17:00'},
];
const DEF_SHIFTS = [
  {dow:3,s:'19:00',e:'23:00',on:true},
  {dow:6,s:'20:00',e:'24:00',on:true},
];

// State
let tasks, events, cfg, dShifts, shOvs;
let selDate = new Date(TODAY);
let bCalMo = new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
let selBDate = null;
let curFlt = 'all';
let curTab = 'today';
let dlOpen = true, doneOpen = false, doneTkOpen = false;
let fibOpen = false, fibCat = 1, fibDate = fmt(TODAY), fibType = 'task';

function load() {
  tasks = JSON.parse(localStorage.getItem('tasks')||'null') ?? DEF_TASKS.map(t=>({...t,sub:[...(t.sub||[])]}));
  events = JSON.parse(localStorage.getItem('events')||'null') ?? DEF_EVENTS.map(e=>({...e}));
  cfg = JSON.parse(localStorage.getItem('settings')||'null') ?? {theme:'auto',showBaito:true};
  dShifts = JSON.parse(localStorage.getItem('defaultShifts')||'null') ?? DEF_SHIFTS.map(s=>({...s}));
  shOvs = JSON.parse(localStorage.getItem('shiftOverrides')||'{}');
}
function save() {
  localStorage.setItem('tasks',JSON.stringify(tasks));
  localStorage.setItem('events',JSON.stringify(events));
  localStorage.setItem('settings',JSON.stringify(cfg));
  localStorage.setItem('defaultShifts',JSON.stringify(dShifts));
  localStorage.setItem('shiftOverrides',JSON.stringify(shOvs));
}

// Theme
function initTheme() { applyTheme(cfg.theme); }
function applyTheme(m) {
  cfg.theme = m;
  const dark = m==='dark' || (m==='auto' && matchMedia('(prefers-color-scheme:dark)').matches);
  if(dark) document.documentElement.setAttribute('data-t','dark');
  else document.documentElement.removeAttribute('data-t');
  save();
  document.querySelectorAll('.s-t-btn').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
}

// Tab switching
const TABS = ['today','tasks','baito'];
let tabIdx = 0;
function swTab(name, e) {
  if(e) e.stopPropagation();
  const ni = TABS.indexOf(name);
  if(ni===tabIdx) return;
  const dir = ni>tabIdx ? 1 : -1;
  const cur = document.getElementById('pg-'+TABS[tabIdx]);
  const nxt = document.getElementById('pg-'+name);
  nxt.style.display='block';
  nxt.style.position='absolute';
  nxt.style.top='0';
  nxt.style.left='0';
  nxt.style.width='100%';
  nxt.style.transform=`translateX(${dir*100}%)`;
  nxt.style.opacity='0';
  nxt.style.transition='none';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const T='transform 0.2s ease-out,opacity 0.2s ease-out';
    cur.style.transition=T; nxt.style.transition=T;
    cur.style.transform=`translateX(${-dir*100}%)`; cur.style.opacity='0';
    nxt.style.transform='translateX(0)'; nxt.style.opacity='1';
  }));
  setTimeout(()=>{
    cur.style.display='none';
    [cur,nxt].forEach(el=>{
      el.style.transform=''; el.style.opacity=''; el.style.transition='';
      el.style.position=''; el.style.top=''; el.style.left=''; el.style.width='';
    });
    renderTab(name);
  },220);
  tabIdx=ni; curTab=name;
  document.querySelectorAll('.nv').forEach(n=>n.classList.toggle('on',n.dataset.tab===name));
  document.getElementById('hdrTitle').textContent={today:'今日',tasks:'タスク',baito:'バイト'}[name];
  closeFib();
}

function renderTab(n) {
  if(n==='today'){ rDL(); rTT(); rStrip(); rTL(fmt(selDate)); }
  if(n==='tasks') rTasks();
  if(n==='baito') rBaito();
}
function renderAll() { renderTab(curTab); }

// ---- DEADLINES ----
const chevU = ()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>`;
const chevD = ()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>`;

function togDL() {
  dlOpen=!dlOpen;
  const w=document.getElementById('dlWrap');
  w.style.maxHeight=dlOpen?'2000px':'0';
  document.getElementById('dlTogBtn').innerHTML=dlOpen?chevU():chevD();
}

function rDL() {
  const el=document.getElementById('dlList');
  const list=tasks.filter(t=>!t.done&&t.due).sort((a,b)=>a.due.localeCompare(b.due));
  if(!list.length){
    el.innerHTML='<div style="padding:10px 0;text-align:center;font-size:13px;color:var(--sub)">締め切りなし</div>';
    return;
  }
  el.innerHTML=list.map(t=>{
    const d=dU(t.due), over=d<0, urg=!over&&d<=(t.ud??2);
    const badge=over
      ? `<span class="cat-chip c${t.c}" style="opacity:1;border-color:transparent;background:var(--urg)">超過</span>`
      : `<span class="cat-chip c${t.c}" style="opacity:1;border-color:transparent">${cn(t.c)}</span>`;
    return `<div class="dl-card c${t.c}${urg?' urg':''}" onclick="togDD(${t.id})">
      <div class="dl-main">
        <div>
          <span class="dl-days">${over?'!':d}</span>
          <span class="dl-unit">${over?'超過':'日'}</span>
        </div>
        <div>
          <div class="dl-title">${esc(t.title)}</div>
          <div class="dl-meta"><span>${fmtD(parseD(t.due))}</span><span class="dl-time"> ${t.dt||''}</span></div>
        </div>
        ${badge}
      </div>
      <div class="accordion" id="dld-${t.id}">
        <div class="detail-panel">
          <div class="detail-sep"></div>
          ${detForm(t)}
        </div>
      </div>
    </div>`;
  }).join('');
}

function togDD(id) {
  document.getElementById('dld-'+id)?.classList.toggle('open');
}

function detForm(t) {
  const chips=[1,2,3,4,5].map(c=>`<button class="cat-chip c${c}${t.c===c?' sel':''}" onclick="event.stopPropagation();updT(${t.id},'c',${c});renderAll()">${cn(c)}</button>`).join('');
  return `
    <input class="d-input" type="text" value="${esc(t.title)}" placeholder="タイトル" oninput="updT(${t.id},'title',this.value)" onclick="event.stopPropagation()">
    <div class="d-row">
      <input class="d-date" type="date" value="${t.due||''}" onchange="updT(${t.id},'due',this.value);renderAll()" onclick="event.stopPropagation()">
      <input class="d-time" type="time" value="${t.dt||'23:59'}" onchange="updT(${t.id},'dt',this.value)" onclick="event.stopPropagation()">
    </div>
    <div class="cat-chips">${chips}</div>
    <textarea class="d-textarea" rows="3" placeholder="メモ" oninput="updT(${t.id},'memo',this.value)" onclick="event.stopPropagation()">${esc(t.memo||'')}</textarea>
    <div class="urg-row">
      <div class="urg-lbl"><span>緊急表示</span><span id="ul-${t.id}">${t.ud??2}日前から</span></div>
      <input type="range" min="1" max="7" value="${t.ud??2}" oninput="updT(${t.id},'ud',+this.value);document.getElementById('ul-${t.id}').textContent=this.value+'日前から'" onclick="event.stopPropagation()">
    </div>
    <button class="del-btn" onclick="event.stopPropagation();delT(${t.id})">削除</button>`;
}

function updT(id,k,v) {
  const t=tasks.find(x=>x.id===id);
  if(t){ t[k]=v; save(); }
}
function delT(id) {
  if(!confirm('削除しますか？')) return;
  tasks=tasks.filter(t=>t.id!==id);
  save(); renderAll();
}

// ---- TODAY TASKS ----
function rTT() {
  const el=document.getElementById('ttList');
  const wk=new Date(TODAY); wk.setDate(TODAY.getDate()+7); const wkS=fmt(wk);
  const active=tasks.filter(t=>!t.done&&t.due&&t.due<=wkS).sort((a,b)=>a.due.localeCompare(b.due));
  const done=tasks.filter(t=>t.done);
  let h=active.map(t=>ttRow(t)).join('');
  h+=`<div class="done-hdr" onclick="togDone('doneL','doneCt')">完了 (${done.length})
    <svg id="doneCt" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform 0.2s${doneOpen?';transform:rotate(180deg)':''}"><path d="M6 9l6 6 6-6"/></svg>
  </div>
  <div class="done-list${doneOpen?' open':''}" id="doneL">${done.map(t=>ttRow(t,true)).join('')}</div>`;
  el.innerHTML=h;
}

function togDone(lid,cid) {
  doneOpen=!doneOpen;
  document.getElementById(lid)?.classList.toggle('open',doneOpen);
  const c=document.getElementById(cid);
  if(c) c.style.transform=doneOpen?'rotate(180deg)':'';
}

function ttRow(t,isDone=false) {
  const d=dU(t.due), over=d<0, urg=!isDone&&!over&&d<=(t.ud??2);
  const bCls=over?'over':urg?'urg':'', bTxt=over?'超過':d+'日';
  const prog=t.sub?.length?` <span style="font-size:11px;color:var(--sub)">${t.sub.filter(s=>s.done).length}/${t.sub.length}</span>`:'';
  const subs=(t.sub||[]).map(s=>`<div class="sub-row"><div class="sub-chk${s.done?' done':''}" onclick="togSub(${t.id},${s.id})"></div><div class="sub-title${s.done?' done':''}">${esc(s.text)}</div></div>`).join('');
  return `
    <div class="tt-row c${t.c}${isDone?' done-row':''}" data-id="${t.id}" onclick="togTtExp(${t.id})">
      <div class="tt-chk${t.done?' done':''}" onclick="event.stopPropagation();doChk(${t.id})"></div>
      <div><div class="tt-title">${esc(t.title)}${prog}</div><div class="tt-sub">${fmtD(parseD(t.due))} ${t.dt||''} · ${cn(t.c)}</div></div>
      <div class="tt-badge ${bCls}">${bTxt}</div>
    </div>
    <div class="subs-area" id="sa-${t.id}">${subs}<button class="add-sub-btn" onclick="addSubStart(${t.id},'sa-${t.id}')">+ サブタスク</button></div>
    <div class="tt-detail" id="td-${t.id}"><div class="detail-sep" style="margin:0 0 8px"></div>${detForm(t)}</div>`;
}

function togTtExp(id) {
  document.getElementById('sa-'+id)?.classList.toggle('open');
  document.getElementById('td-'+id)?.classList.toggle('open');
}

function doChk(id) {
  const t=tasks.find(x=>x.id===id);
  if(!t) return;
  if(t.done){ t.done=false; save(); renderAll(); return; }
  const row=document.querySelector(`.tt-row[data-id="${id}"]`);
  if(row){
    const chk=row.querySelector('.tt-chk');
    chk.classList.add('done');
    chk.style.animation='chkPop 0.15s ease-out';
    row.style.background='rgba(60,180,60,.12)';
    row.style.transition='background 0.15s';
    setTimeout(()=>{
      row.style.background='';
      setTimeout(()=>{
        row.style.transition='opacity 0.2s,transform 0.2s';
        row.style.opacity='0';
        row.style.transform='translateY(8px)';
        setTimeout(()=>{ t.done=true; save(); renderAll(); },200);
      },300);
    },150);
  } else {
    t.done=true; save(); renderAll();
  }
}

function togSub(pid,sid) {
  const t=tasks.find(x=>x.id===pid);
  if(!t) return;
  const s=t.sub.find(x=>x.id===sid);
  if(s){ s.done=!s.done; save(); renderAll(); }
}

function addSubStart(pid,cid) {
  const c=document.getElementById(cid);
  if(!c) return;
  c.classList.add('open');
  const inp=document.createElement('input');
  inp.style.cssText='width:100%;height:36px;border:none;border-radius:12px;background:var(--bg);font-size:15px;font-weight:500;color:var(--tx);padding:0 12px;font-family:inherit;margin:4px 0;outline:none;display:block';
  inp.placeholder='サブタスクを入力...';
  const btn=c.querySelector('.add-sub-btn');
  c.insertBefore(inp,btn);
  inp.focus();
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&inp.value.trim()){
      const t=tasks.find(x=>x.id===pid);
      if(t){ t.sub.push({id:newId(),text:inp.value.trim(),done:false}); save(); renderAll();
        setTimeout(()=>{ const nc=document.getElementById(cid); if(nc) nc.classList.add('open'); },30); }
    }
    if(e.key==='Escape') inp.remove();
  });
  inp.addEventListener('blur',()=>setTimeout(()=>{ if(inp.parentNode) inp.remove(); },200));
}

// ---- STRIP & TIMELINE ----
function selectDate(ds) {
  selDate = parseD(ds);
  rStrip();
  rTL(ds);
}

function rStrip() {
  const el=document.getElementById('strip');
  const cells=[];
  for(let i=-3;i<=14;i++){
    const d=new Date(TODAY); d.setDate(TODAY.getDate()+i);
    const ds=fmt(d), isT=i===0, isSel=ds===fmt(selDate)&&!isT;
    const evts=dayEvts(ds);
    const cats=[...new Set(evts.map(e=>e.c))].slice(0,3);
    const dots=cats.map(c=>`<div class="sd-dot c${c}" style="background:var(--cc)"></div>`).join('');
    cells.push(`<div class="sd-cell${isT?' today-c':''}${isSel?' sel-c':''}" onclick="selectDate('${ds}')">
      <div class="sd-dow">${DOW[d.getDay()]}</div>
      <div class="sd-num">${d.getDate()}</div>
      <div class="sd-dots">${dots}</div>
    </div>`);
  }
  el.innerHTML=cells.join('');
  el.querySelector('.today-c')?.scrollIntoView({inline:'center',block:'nearest'});
}

function dayEvts(ds) {
  const base=events.filter(e=>e.date===ds);
  const bEvts=baitoDay(parseD(ds));
  let all=[...base,...bEvts];
  if(!cfg.showBaito) all=all.filter(e=>e.c!==1);
  const seen=new Set();
  return all.filter(e=>{ const k=e.title+e.s; if(seen.has(k)) return false; seen.add(k); return true; })
    .sort((a,b)=>(a.s||'').localeCompare(b.s||''));
}

function baitoDay(d) {
  const ds=fmt(d), dw=d.getDay(), ov=shOvs[ds];
  if(ov?.type==='off') return [];
  if(ov?.type==='change'||ov?.type==='add') return [{id:'bov-'+ds,title:'バイト',c:1,date:ds,s:ov.s,e:ov.e}];
  const df=dShifts.find(x=>x.dow===dw&&x.on);
  if(df) return [{id:'bdf-'+ds,title:'バイト',c:1,date:ds,s:df.s,e:df.e}];
  return [];
}

function rTL(ds) {
  const el=document.getElementById('tlToday');
  const evts=dayEvts(ds);
  if(!evts.length){ el.innerHTML='<div class="tl-empty">予定なし</div>'; return; }
  el.innerHTML=evts.map(ev=>`
    <div class="tb">
      <div class="tb-time">${ev.s||''}</div>
      <div class="tb-ev c${ev.c}">
        <div class="tb-dot"></div>
        <div><div class="tb-ev-t">${esc(ev.title)}</div><div class="tb-ev-sub">${ev.s||''}${ev.e?' — '+ev.e:''}</div></div>
        <div class="tb-dur">${dur(ev.s,ev.e)}</div>
      </div>
    </div>`).join('');
}

// ---- TASKS TAB ----
function setFlt(f) {
  curFlt=f;
  document.querySelectorAll('.f-chip').forEach(c=>c.classList.toggle('on',c.dataset.cat===f));
  rTasks();
}

function rTasks() {
  const el=document.getElementById('tkList');
  let list=tasks.filter(t=>!t.done);
  if(curFlt!=='all') list=list.filter(t=>String(t.c)===curFlt);
  list.sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  const done=tasks.filter(t=>t.done&&(curFlt==='all'||String(t.c)===curFlt));
  let h=list.map(t=>tkCard(t)).join('');
  h+=`<div class="done-hdr" style="padding:10px 20px" onclick="togTkDone()">完了 (${done.length})
    <svg id="doneTkCt" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform 0.2s${doneTkOpen?';transform:rotate(180deg)':''}"><path d="M6 9l6 6 6-6"/></svg>
  </div>
  <div class="done-list${doneTkOpen?' open':''}" id="doneTkL">${done.map(t=>tkCard(t,true)).join('')}</div>`;
  el.innerHTML=h;
}

function togTkDone() {
  doneTkOpen=!doneTkOpen;
  document.getElementById('doneTkL')?.classList.toggle('open',doneTkOpen);
  const c=document.getElementById('doneTkCt');
  if(c) c.style.transform=doneTkOpen?'rotate(180deg)':'';
}

function tkCard(t,isDone=false) {
  const d=dU(t.due), over=d<0, urg=!isDone&&!over&&d<=(t.ud??2);
  const bCls=over?'over':urg?'urg':'', bTxt=over?'超過':d+'日';
  const prog=t.sub?.length?` <span style="font-size:11px;color:var(--sub)">${t.sub.filter(s=>s.done).length}/${t.sub.length}</span>`:'';
  const subs=(t.sub||[]).map(s=>`<div class="sub-row"><div class="sub-chk${s.done?' done':''}" onclick="togSub(${t.id},${s.id})"></div><div class="sub-title${s.done?' done':''}">${esc(s.text)}</div></div>`).join('');
  return `<div class="tk-card c${t.c}" data-id="${t.id}">
    <div class="tk-main" onclick="togTkExp(${t.id})">
      <div class="tt-chk${t.done?' done':''}" onclick="event.stopPropagation();doChk(${t.id})"></div>
      <div><div class="tt-title">${esc(t.title)}${prog}</div><div class="tt-sub">${t.due?fmtD(parseD(t.due)):''} ${t.dt||''} · ${cn(t.c)}</div></div>
      <div class="tt-badge ${bCls}">${bTxt}</div>
    </div>
    <div class="tk-subs" id="tks-${t.id}">${subs}<button class="add-sub-btn" onclick="addSubStart(${t.id},'tks-${t.id}')">+ サブタスク</button></div>
    <div class="tk-detail" id="tkd-${t.id}"><div class="detail-sep"></div>${detForm(t)}</div>
  </div>`;
}

function togTkExp(id) {
  document.getElementById('tks-'+id)?.classList.toggle('open');
  document.getElementById('tkd-'+id)?.classList.toggle('open');
}

// ---- BAITO ----
function rBaito() { rBShifts(); rBStats(); rBCal(); }

function rBShifts() {
  document.getElementById('shiftList').innerHTML=dShifts.map((s,i)=>
    `<div class="shift-row"><div class="shift-dow">${DOW[s.dow]}</div><div class="shift-time">${s.s} — ${s.e}</div><button class="tog-sw${s.on?' on':''}" onclick="togShift(${i})"></button></div>`
  ).join('');
}

function togShift(i) { dShifts[i].on=!dShifts[i].on; save(); rBaito(); }

function rBStats() {
  const el=document.getElementById('baitoStats');
  const yr=bCalMo.getFullYear(), mo=bCalMo.getMonth(), dm=new Date(yr,mo+1,0).getDate();
  let days=0, mins=0;
  for(let d=1;d<=dm;d++){
    const dt=new Date(yr,mo,d), evts=baitoDay(dt);
    if(evts.length){
      days++;
      evts.forEach(e=>{
        if(e.s&&e.e){
          const [sh,sm]=e.s.split(':').map(Number),[eh,em]=e.e.split(':').map(Number);
          mins+=(eh*60+em)-(sh*60+sm);
        }
      });
    }
  }
  const h=Math.floor(mins/60), m=mins%60;
  el.innerHTML=`<div><div class="stat-n">${days}</div><div class="stat-l">出勤日数</div></div><div><div class="stat-n">${h}h${m?m+'m':''}</div><div class="stat-l">合計時間</div></div>`;
}

function rBCal() {
  const yr=bCalMo.getFullYear(), mo=bCalMo.getMonth();
  document.getElementById('calMo').textContent=`${yr}年${mo+1}月`;
  const el=document.getElementById('calGrid');
  const first=new Date(yr,mo,1).getDay(), dm=new Date(yr,mo+1,0).getDate();
  let h=DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) h+=`<div class="cal-day other-m"></div>`;
  for(let d=1;d<=dm;d++){
    const dt=new Date(yr,mo,d), ds=fmt(dt), isT=fmt(dt)===fmt(TODAY), isSel=selBDate===ds;
    h+=`<div class="cal-day${isT?' today-d':''}${isSel&&!isT?' sel-d':''}" onclick="selBCal('${ds}')">${d}${baitoDay(dt).length?'<div class="cal-day-dot"></div>':''}</div>`;
  }
  el.innerHTML=h;
  rBAction();
}

function selBCal(ds) { selBDate=ds; rBCal(); }
function prevBMo(){ bCalMo=new Date(bCalMo.getFullYear(),bCalMo.getMonth()-1,1); rBaito(); }
function nextBMo(){ bCalMo=new Date(bCalMo.getFullYear(),bCalMo.getMonth()+1,1); rBaito(); }

function rBAction() {
  const el=document.getElementById('baitoAct');
  if(!selBDate){ el.style.display='none'; return; }
  el.style.display='block';
  const d=parseD(selBDate), dw=d.getDay(), df=dShifts.find(s=>s.dow===dw&&s.on), ov=shOvs[selBDate];
  const cur=ov?.type||(df?'normal':'none'), showT=cur==='change'||cur==='add';
  el.innerHTML=`<div class="b-action-title">${fmtD(d)}</div>
    <div class="b-action-btns">
      ${df
        ? `<button class="b-act-btn${cur==='normal'?' on':''}" onclick="setBOv('${selBDate}','normal')">通常</button><button class="b-act-btn${cur==='off'?' on':''}" onclick="setBOv('${selBDate}','off')">休み</button><button class="b-act-btn${cur==='change'?' on':''}" onclick="setBOv('${selBDate}','change')">変更</button>`
        : `<button class="b-act-btn${cur==='add'?' on':''}" onclick="setBOv('${selBDate}','add')">追加</button><button class="b-act-btn${cur==='none'?' on':''}" onclick="setBOv('${selBDate}','none')">なし</button>`
      }
    </div>
    ${showT?`<div class="t-inputs"><input class="t-inp" type="time" id="bS" value="${ov?.s||(df?.s||'09:00')}" onchange="saveBT('${selBDate}')"><input class="t-inp" type="time" id="bE" value="${ov?.e||(df?.e||'17:00')}" onchange="saveBT('${selBDate}')"></div>`:''}`;
}

function setBOv(ds,type){
  if(type==='normal'||type==='none') delete shOvs[ds];
  else { if(!shOvs[ds]) shOvs[ds]={type,s:'',e:''}; else shOvs[ds].type=type; }
  save(); rBaito();
}
function saveBT(ds){
  const s=document.getElementById('bS'), e=document.getElementById('bE');
  if(!shOvs[ds]) shOvs[ds]={type:'change',s:'',e:''};
  if(s) shOvs[ds].s=s.value;
  if(e) shOvs[ds].e=e.value;
  save();
}

// ---- FIB ----
function openFib(){
  if(fibOpen) return;
  fibOpen=true;
  document.getElementById('fibInput').removeAttribute('readonly');
  document.getElementById('fibPanel').classList.add('open');
  document.getElementById('fibBd').classList.add('active');
  rFibPanel();
  setTimeout(()=>document.getElementById('fibInput').focus(),50);
}
function closeFib(){
  if(!fibOpen) return;
  fibOpen=false;
  document.getElementById('fibPanel').classList.remove('open');
  document.getElementById('fibBd').classList.remove('active');
  document.getElementById('fibInput').value='';
  document.getElementById('fibInput').setAttribute('readonly','');
}
function rFibPanel(){
  const cats=[1,2,3,4,5].map(c=>`<button class="cat-chip c${c}${fibCat===c?' sel':''}" onclick="fibCat=${c};rFibPanel()">${cn(c)}</button>`).join('');
  const t0=fmt(TODAY), t1=fmt(new Date(TODAY.getTime()+864e5)), t2=fmt(new Date(TODAY.getTime()+2*864e5));
  const isCustom=![t0,t1,t2].includes(fibDate);
  const dbs=[t0,t1,t2].map((ds,i)=>`<button class="fib-date-btn${fibDate===ds?' on':''}" onclick="fibDate='${ds}';rFibPanel()">${['今日','明日','明後日'][i]}</button>`).join('');
  document.getElementById('fibPanel').innerHTML=`
    <div class="fib-cat-chips">${cats}</div>
    <div class="fib-date-row">${dbs}<button class="fib-date-btn${isCustom?' on':''}" onclick="document.getElementById('fdp').click()">指定</button><input type="date" id="fdp" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0" value="${fibDate}" onchange="fibDate=this.value;rFibPanel()"></div>
    <div class="fib-time-row"><span class="fib-time-lbl">時刻</span><input class="fib-time-inp" type="time" id="fibTm" value="23:59"></div>
    <div class="fib-type-row"><button class="fib-type-btn${fibType==='task'?' on':''}" onclick="fibType='task';rFibPanel()">タスク</button><button class="fib-type-btn${fibType==='event'?' on':''}" onclick="fibType='event';rFibPanel()">予定</button></div>
    <button class="fib-add-btn" onclick="submitFib()">追加</button>`;
}
function submitFib(){
  const title=document.getElementById('fibInput').value.trim();
  if(!title) return;
  const tm=document.getElementById('fibTm')?.value||'23:59';
  if(fibType==='task') tasks.push({id:newId(),title,c:fibCat,due:fibDate,dt:tm,done:false,sub:[],memo:'',ud:2});
  else events.push({id:newId(),title,c:fibCat,date:fibDate,s:tm,e:null});
  save(); renderAll(); closeFib();
}

// ---- SETTINGS ----
function openSet(){
  document.getElementById('sBg').classList.add('open');
  document.getElementById('sPan').classList.add('open');
  document.querySelectorAll('.s-t-btn').forEach(b=>b.classList.toggle('on',b.dataset.m===cfg.theme));
  document.getElementById('bTog').classList.toggle('on',cfg.showBaito);
}
function closeSet(){
  document.getElementById('sBg').classList.remove('open');
  document.getElementById('sPan').classList.remove('open');
}
function togBaito(){
  cfg.showBaito=!cfg.showBaito;
  save(); renderAll();
  document.getElementById('bTog').classList.toggle('on',cfg.showBaito);
}

(function(){
  load();
  initTheme();
  document.getElementById('hdrDate').textContent=fmtDL(TODAY);
  const dw=document.getElementById('dlWrap');
  dw.style.transition='max-height 0.2s ease-out';
  dw.style.overflow='hidden';
  dw.style.maxHeight='2000px';
  rDL(); rTT(); rStrip(); rTL(fmt(TODAY));
  document.getElementById('fibInput').setAttribute('readonly','');
})();
</script>
