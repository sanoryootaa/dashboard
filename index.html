<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #ffffff;
      --bg1: #f2f2f2;
      --tx1: #000000;
      --tx2: #888888;
      --urg-bg: rgba(255,48,48,.15);
    }
    [data-theme="dark"] {
      --bg0: #000000;
      --bg1: #1c1c1e;
      --tx1: #ffffff;
      --tx2: #888888;
      --urg-bg: rgba(255,48,48,.25);
    }
    .c1 { --cc: #d4a020; }
    .c2 { --cc: #c86030; }
    .c3 { --cc: #509830; }
    .c4 { --cc: #2878b8; }
    .c5 { --cc: #8048a0; }
    [data-theme="dark"] .c1 { --cc: #f0b824; }
    [data-theme="dark"] .c2 { --cc: #e47040; }
    [data-theme="dark"] .c3 { --cc: #5cb038; }
    [data-theme="dark"] .c4 { --cc: #3090d0; }
    [data-theme="dark"] .c5 { --cc: #9458b8; }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{background:var(--bg0)}
    body{
      background:var(--bg0);color:var(--tx1);
      font-family:'Zen Kaku Gothic New',sans-serif;
      font-weight:500;font-size:16px;
      max-width:430px;margin:0 auto;min-height:100vh;
    }

    button:active,.nv:active,.dl-card:active,.tk-card:active,.tt-row:active,.sd-cell:active{
      transform:scale(0.96);opacity:0.8;transition:transform 0.1s,opacity 0.1s;
    }

    .hdr{
      position:sticky;top:0;z-index:40;background:var(--bg0);
      padding:52px 24px 16px;
      display:flex;justify-content:space-between;align-items:flex-end;
    }
    .hdr-left{flex:1}
    .hdr-date{font-size:20px;font-weight:700;color:var(--tx1)}
    .hdr-title{font-size:28px;font-weight:700;color:var(--tx1);margin-top:4px}
    .icon-btn{
      min-width:48px;min-height:48px;border-radius:16px;
      background:var(--bg1);border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;color:var(--tx2);
      font-family:inherit;flex-shrink:0;
    }
    .icon-btn svg{width:22px;height:22px}

    .tab-wrap{position:relative}
    .tab-page{width:100%}
    .tab-page.hidden{display:none}

    .sec{padding:0 24px;margin-bottom:24px}
    .sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .sec-title{font-size:16px;font-weight:700}
    .sec-link{
      font-size:13px;font-weight:500;color:var(--tx2);
      background:none;border:none;cursor:pointer;font-family:inherit;
      min-height:48px;padding:0 8px;
    }
    .sec-toggle{
      min-width:48px;min-height:48px;border-radius:16px;
      background:var(--bg1);border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;color:var(--tx2);
    }

    .cat-tag{
      background:var(--cc);color:#fff;font-size:13px;font-weight:700;
      padding:6px 12px;border-radius:8px;white-space:nowrap;display:inline-block;
    }

    .dl-list{display:flex;flex-direction:column;gap:8px}
    .dl-card{
      background:var(--bg1);border-radius:16px;
      border-left:5px solid var(--cc);overflow:hidden;cursor:pointer;
    }
    .dl-card.urg{background:var(--urg-bg)}
    .dl-main{
      display:grid;grid-template-columns:64px 1fr auto;
      align-items:center;gap:16px;
      padding:16px 16px 16px 12px;
    }
    .dl-num{text-align:center}
    .dl-days{display:block;font-size:28px;font-weight:700;color:var(--cc);line-height:1.1}
    .dl-unit{font-size:13px;font-weight:500;color:var(--tx2)}
    .dl-title{font-size:16px;font-weight:700;margin-bottom:4px}
    .dl-meta{font-size:16px;font-weight:500;color:var(--tx2)}
    .dl-time{opacity:0.6}
    .dl-detail{
      max-height:0;overflow:hidden;
      transition:max-height 0.2s ease-out,padding 0.2s ease-out;
      padding:0 16px;
    }
    .dl-detail.open{max-height:700px;padding:0 16px 16px}
    .detail-sep{height:1px;background:rgba(128,128,128,.15);margin-bottom:16px}

    .detail-input,.detail-date,.detail-time{
      width:100%;background:var(--bg0);border:none;border-radius:16px;
      padding:0 16px;height:48px;
      font-size:16px;font-weight:500;color:var(--tx1);font-family:inherit;
      margin-bottom:8px;outline:none;
    }
    .detail-textarea{
      width:100%;background:var(--bg0);border:none;border-radius:16px;
      padding:12px 16px;
      font-size:16px;font-weight:500;color:var(--tx1);font-family:inherit;
      margin-bottom:8px;outline:none;resize:none;
    }
    .detail-row{display:flex;gap:8px}
    .detail-row .detail-date,.detail-row .detail-time{flex:1}

    .urg-slider-row{margin-bottom:8px}
    .urg-slider-label{font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:4px;display:flex;justify-content:space-between}
    input[type="range"]{width:100%;accent-color:var(--tx1);cursor:pointer;margin-bottom:8px}

    .del-btn{
      width:100%;height:48px;border-radius:16px;
      background:none;border:none;cursor:pointer;
      font-size:16px;font-weight:700;color:#ff3030;font-family:inherit;
    }

    .cat-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .cat-chip{
      height:48px;padding:0 16px;border-radius:16px;
      background:var(--cc);color:#fff;font-size:13px;font-weight:700;
      border:3px solid transparent;cursor:pointer;font-family:inherit;
      display:flex;align-items:center;
    }
    .cat-chip.sel{border-color:var(--tx1)}

    .tt-row{
      display:grid;grid-template-columns:40px 1fr auto;
      align-items:center;gap:8px;
      padding:14px 24px;
      border-bottom:1px solid rgba(128,128,128,.12);
      cursor:pointer;
    }
    .tt-chk{
      width:28px;height:28px;border-radius:50%;
      border:2.5px solid var(--cc);
      flex-shrink:0;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background 0.15s,border-color 0.15s;
    }
    .tt-chk.done{background:var(--cc);border-color:var(--cc)}
    .tt-chk.done::after{
      content:'';display:block;
      width:9px;height:6px;
      border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;
      transform:rotate(-45deg) translateY(-1px);
    }
    .tt-title{font-size:16px;font-weight:500}
    .tt-sub{font-size:13px;font-weight:500;color:var(--tx2);margin-top:2px}
    .tt-badge{
      font-size:16px;font-weight:700;
      background:var(--bg1);color:var(--tx2);
      padding:6px 12px;border-radius:8px;white-space:nowrap;flex-shrink:0;
    }
    .tt-badge.urg{background:var(--urg-bg);color:#ff3030}
    .tt-badge.over{background:#ff3030;color:#fff}
    .prog{font-size:13px;font-weight:500;color:var(--tx2);margin-left:4px}

    .tt-subs{
      max-height:0;overflow:hidden;
      transition:max-height 0.2s ease-out;
      padding:0 24px;
    }
    .tt-subs.open{max-height:600px;padding-bottom:8px}
    .sub-row{
      display:flex;align-items:center;gap:8px;
      padding:8px 0;border-bottom:1px solid rgba(128,128,128,.08);
    }
    .sub-chk{
      width:20px;height:20px;border-radius:50%;
      border:2px solid var(--tx2);flex-shrink:0;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background 0.15s;
    }
    .sub-chk.done{background:var(--tx2)}
    .sub-chk.done::after{
      content:'';display:block;width:6px;height:4px;
      border-left:2px solid var(--bg0);border-bottom:2px solid var(--bg0);
      transform:rotate(-45deg) translateY(-1px);
    }
    .sub-title{font-size:13px;font-weight:500;flex:1}
    .sub-title.done{text-decoration:line-through;color:var(--tx2)}
    .add-sub-btn{
      font-size:13px;font-weight:500;color:var(--tx2);
      background:none;border:none;cursor:pointer;
      padding:8px 0;text-align:left;font-family:inherit;
      min-height:48px;width:100%;
    }

    .tt-detail{
      max-height:0;overflow:hidden;
      transition:max-height 0.2s ease-out;
      padding:0 24px;
      background:var(--bg0);
    }
    .tt-detail.open{max-height:800px;padding:8px 24px 16px}

    .done-hdr{
      padding:16px 24px;font-size:13px;font-weight:500;color:var(--tx2);
      cursor:pointer;display:flex;align-items:center;gap:8px;min-height:48px;
    }
    .done-list{max-height:0;overflow:hidden;transition:max-height 0.2s ease-out}
    .done-list.open{max-height:3000px}
    .done-row .tt-title{text-decoration:line-through}
    .done-row .tt-chk{opacity:0.5}

    .strip-wrap{overflow-x:auto;scrollbar-width:none;padding:0 24px 16px}
    .strip-wrap::-webkit-scrollbar{display:none}
    .strip{display:flex;gap:8px;padding:4px 0}
    .sd-cell{
      min-width:56px;flex-shrink:0;
      display:flex;flex-direction:column;align-items:center;
      padding:10px 4px 12px;border-radius:16px;cursor:pointer;
      transition:background 0.2s ease-out;
    }
    .sd-cell.today-c{background:#000}
    [data-theme="dark"] .sd-cell.today-c{background:#fff}
    .sd-cell.sel-c{background:var(--bg1)}
    .sd-dow{font-size:13px;font-weight:500;color:var(--tx2)}
    .sd-num{font-size:16px;font-weight:500;color:var(--tx1);margin-top:2px}
    .sd-cell.today-c .sd-dow,.sd-cell.today-c .sd-num{color:#fff;font-weight:700}
    [data-theme="dark"] .sd-cell.today-c .sd-dow,[data-theme="dark"] .sd-cell.today-c .sd-num{color:#000}
    .sd-dots{display:flex;gap:3px;margin-top:4px;height:6px;align-items:center}
    .sd-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

    .tl{position:relative;padding:0 24px}
    .tl::before{content:'';position:absolute;left:32px;top:0;bottom:0;width:1px;background:rgba(128,128,128,.15)}
    .tb{position:relative;padding:0 0 16px 24px}
    .tb-time{font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:6px}
    .tb-ev{
      display:grid;grid-template-columns:8px 1fr auto;
      align-items:center;gap:12px;
      padding:12px 16px;background:var(--bg1);border-radius:16px;
    }
    .tb-dot{width:8px;height:8px;border-radius:4px;background:var(--cc);flex-shrink:0}
    .tb-ev-t{font-size:13px;font-weight:500}
    .tb-ev-sub{font-size:13px;font-weight:500;color:var(--tx2);margin-top:2px}
    .tb-dur{font-size:13px;font-weight:500;color:var(--tx2);white-space:nowrap}
    .tl-empty{font-size:16px;font-weight:500;color:var(--tx2);padding:16px 0;text-align:center}

    .filter-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:8px 24px 16px}
    .filter-row::-webkit-scrollbar{display:none}
    .filter-chip{
      height:48px;padding:0 20px;border-radius:16px;
      font-size:13px;font-weight:500;color:var(--tx2);
      background:transparent;border:none;cursor:pointer;
      white-space:nowrap;font-family:inherit;flex-shrink:0;
    }
    .filter-chip.on{background:var(--bg1);color:var(--tx1);font-weight:700}

    .tk-card{
      background:var(--bg1);border-radius:16px;
      border-left:5px solid var(--cc);
      margin:0 24px 8px;overflow:hidden;cursor:pointer;
    }
    .tk-main{
      display:grid;grid-template-columns:40px 1fr auto;
      align-items:center;gap:8px;
      padding:14px 16px 14px 12px;
    }
    .tk-subs{
      max-height:0;overflow:hidden;
      transition:max-height 0.2s ease-out;
      padding:0 12px;
    }
    .tk-subs.open{max-height:600px;padding-bottom:8px}
    .tk-detail{
      max-height:0;overflow:hidden;
      transition:max-height 0.2s ease-out;
      padding:0 12px;
    }
    .tk-detail.open{max-height:800px;padding:0 12px 16px}

    .baito-card{background:var(--bg1);border-radius:16px;margin:0 24px 16px;padding:16px}
    .shift-row{
      display:grid;grid-template-columns:40px 1fr 60px;
      align-items:center;gap:8px;
      padding:8px 0;border-bottom:1px solid rgba(128,128,128,.12);
    }
    .shift-row:last-child{border-bottom:none}
    .shift-dow{font-size:16px;font-weight:700}
    .shift-time{font-size:13px;font-weight:500;color:var(--tx2)}
    .tog-sw{
      position:relative;width:51px;height:31px;
      background:var(--tx2);border-radius:16px;
      cursor:pointer;transition:background 0.2s;flex-shrink:0;border:none;
      justify-self:end;
    }
    .tog-sw.on{background:#d4a020}
    .tog-sw::after{
      content:'';position:absolute;top:2px;left:2px;
      width:27px;height:27px;border-radius:50%;
      background:#fff;transition:transform 0.2s;
      box-shadow:0 1px 3px rgba(0,0,0,.25);
    }
    .tog-sw.on::after{transform:translateX(20px)}

    .baito-stats{
      background:var(--bg1);border-radius:16px;
      margin:0 24px 16px;padding:16px;
      display:grid;grid-template-columns:1fr 1fr;
      gap:16px;text-align:center;
    }
    .stat-num{font-size:28px;font-weight:700}
    .stat-lbl{font-size:13px;font-weight:500;color:var(--tx2);margin-top:4px}

    .cal-nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;margin-bottom:16px;
    }
    .cal-nav-btn{
      min-width:48px;min-height:48px;background:var(--bg1);
      border:none;border-radius:16px;cursor:pointer;
      font-size:16px;font-weight:700;color:var(--tx1);
      display:flex;align-items:center;justify-content:center;font-family:inherit;
    }
    .cal-month{font-size:16px;font-weight:700}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 16px 16px}
    .cal-dow{text-align:center;font-size:13px;font-weight:500;color:var(--tx2);padding:8px 0}
    .cal-day{
      aspect-ratio:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      border-radius:16px;cursor:pointer;font-size:16px;font-weight:500;
      position:relative;min-height:40px;
    }
    .cal-day.today-d{background:#000;color:#fff;font-weight:700}
    [data-theme="dark"] .cal-day.today-d{background:#fff;color:#000}
    .cal-day.sel-d{background:var(--bg1)}
    .cal-day.other-mo{opacity:0.3}
    .cal-day-dot{
      position:absolute;bottom:4px;
      width:6px;height:6px;border-radius:50%;background:#d4a020;
    }
    .baito-action-area{background:var(--bg1);border-radius:16px;margin:0 24px 16px;padding:16px}
    .baito-action-title{font-size:16px;font-weight:700;margin-bottom:12px}
    .baito-action-btns{display:flex;gap:8px;margin-bottom:8px}
    .baito-act-btn{
      flex:1;height:48px;border-radius:16px;
      background:var(--bg0);border:none;cursor:pointer;
      font-size:13px;font-weight:700;color:var(--tx2);font-family:inherit;
    }
    .baito-act-btn.on{background:var(--tx1);color:var(--bg0)}
    .time-inputs{display:flex;gap:8px;margin-top:8px}
    .time-inp{
      flex:1;height:48px;border-radius:16px;
      background:var(--bg0);border:none;
      font-size:16px;font-weight:500;color:var(--tx1);
      padding:0 16px;font-family:inherit;
    }

    .fib-outer{
      position:fixed;left:0;right:0;
      bottom:calc(72px + env(safe-area-inset-bottom));
      z-index:100;padding:0 16px;
    }
    .fib-panel{
      background:var(--bg1);border-radius:16px 16px 0 0;
      padding:16px;
      transform:translateY(100%);
      transition:transform 0.2s ease-out,opacity 0.2s ease-out;
      opacity:0;pointer-events:none;
    }
    .fib-panel.open{transform:translateY(0);opacity:1;pointer-events:auto}
    .fib-bar{
      height:52px;background:var(--bg1);
      border-radius:16px;
      display:flex;align-items:center;gap:12px;
      padding:0 16px;cursor:pointer;position:relative;z-index:1;
    }
    .fib-plus{color:var(--tx2);display:flex;align-items:center;flex-shrink:0}
    .fib-plus svg{width:20px;height:20px}
    #fibInput{
      flex:1;background:none;border:none;outline:none;
      font-size:16px;font-weight:500;color:var(--tx1);font-family:inherit;
    }
    #fibInput::placeholder{color:var(--tx2)}
    .fib-bd{position:fixed;inset:0;z-index:90;display:none}
    .fib-bd.active{display:block}

    .fib-cat-chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px}
    .fib-cat-chips::-webkit-scrollbar{display:none}
    .fib-date-btns{display:flex;gap:8px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none}
    .fib-date-btns::-webkit-scrollbar{display:none}
    .fib-date-btn{
      height:48px;padding:0 16px;border-radius:16px;
      background:var(--bg0);border:none;cursor:pointer;
      font-size:13px;font-weight:700;color:var(--tx2);
      font-family:inherit;flex-shrink:0;
    }
    .fib-date-btn.on{background:var(--tx1);color:var(--bg0)}
    .fib-time-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .fib-time-label{font-size:13px;font-weight:500;color:var(--tx2);white-space:nowrap}
    .fib-time-input{
      flex:1;height:48px;border-radius:16px;
      background:var(--bg0);border:none;
      font-size:16px;font-weight:500;color:var(--tx1);
      padding:0 16px;font-family:inherit;outline:none;
    }
    .fib-type-row{display:flex;gap:8px;margin-bottom:8px}
    .fib-type-btn{
      flex:1;height:48px;border-radius:16px;
      background:var(--bg0);border:none;cursor:pointer;
      font-size:13px;font-weight:700;color:var(--tx2);font-family:inherit;
    }
    .fib-type-btn.on{background:var(--tx1);color:var(--bg0)}
    .fib-add-btn{
      width:100%;height:48px;border-radius:16px;
      background:#000;color:#fff;
      border:none;cursor:pointer;
      font-size:16px;font-weight:700;font-family:inherit;
    }
    [data-theme="dark"] .fib-add-btn{background:#fff;color:#000}

    .nav{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:430px;
      display:flex;justify-content:space-around;align-items:center;
      background:var(--bg0);
      border-top:1px solid rgba(128,128,128,.15);
      padding:4px 0;
      padding-bottom:calc(8px + env(safe-area-inset-bottom));
      z-index:50;
    }
    .nv{
      display:flex;flex-direction:column;align-items:center;gap:3px;
      min-width:80px;min-height:48px;justify-content:center;
      font-size:13px;font-weight:500;color:var(--tx2);
      background:none;border:none;cursor:pointer;font-family:inherit;
    }
    .nv.on{color:var(--tx1);font-weight:700}
    .nv svg{width:24px;height:24px}
    .ico-on{display:none}
    .nv.on .ico-off{display:none}
    .nv.on .ico-on{display:block}

    .s-bd{
      position:fixed;inset:0;background:rgba(0,0,0,.5);
      z-index:200;opacity:0;pointer-events:none;transition:opacity 0.2s ease-out;
    }
    .s-bd.open{opacity:1;pointer-events:auto}
    .s-pan{
      position:fixed;top:0;right:-320px;width:320px;height:100%;
      background:var(--bg0);
      z-index:201;transition:right 0.2s ease-out;
      padding:64px 24px 24px;overflow-y:auto;
    }
    .s-pan.open{right:0}
    .s-close-btn{position:absolute;top:12px;right:12px}
    .s-title{font-size:20px;font-weight:700;margin-bottom:32px}
    .s-section{margin-bottom:24px}
    .s-label{font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:8px}
    .s-row{display:flex;justify-content:space-between;align-items:center}
    .s-theme-row{display:flex;gap:8px}
    .s-theme-btn{
      flex:1;height:48px;border-radius:16px;
      background:var(--bg1);border:none;cursor:pointer;
      font-size:13px;font-weight:500;color:var(--tx2);font-family:inherit;
    }
    .s-theme-btn.on{background:var(--tx1);color:var(--bg0);font-weight:700}

    @keyframes chkPop{from{transform:scale(0)}to{transform:scale(1)}}
    .chk-pop{animation:chkPop 0.15s ease-out}

    .spacer{height:140px}
  </style>
</head>
<body>

  <!-- Header -->
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-date" id="hdrDate"></div>
      <div class="hdr-title" id="hdrTitle">今日</div>
    </div>
    <button class="icon-btn" onclick="openSettings()" aria-label="設定">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

  <!-- Settings panel -->

  <div class="s-pan" id="sPan">

      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>

      <div class="s-theme-row">

        <button class="s-theme-btn" data-mode="auto" onclick="setTheme('auto')">自動</button>

        <button class="tog-sw on" id="baitoTog" onclick="toggleBaitoSetting()"></button>
      </div>

    <div class="s-section">
      <div class="s-label">データ</div>
      <button class="del-btn" style="text-align:left;padding:0" onclick="if(confirm('すべてのデータをリセットしますか？')){localStorage.clear();location.reload()}">データをリセット</button>
    </div>
  </div>

  <script>
  'use strict';

  const TODAY = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const DOW = ['日','月','火','水','木','金','土'];
  const parseDate = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };
  const fmtDate = d => `${d.getMonth()+1}月${d.getDate()}日(${DOW[d.getDay()]})`;
  const fmtDateLong = d => `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${DOW[d.getDay()]})`;
  const daysUntil = toStr => Math.ceil((parseDate(toStr)-new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate()))/864e5);
  const durStr = (s,e) => {
    if(!s||!e) return '';
    const [sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
    const m=(eh*60+em)-(sh*60+sm);
    if(m<=0) return '';
    return m>=60?`${Math.floor(m/60)}h${m%60?m%60+'m':''}`:m+'分';
  };
  const catName = c => ['','バイト','大学','制作','プライベート','活動'][c]||'';
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  let nextId = 9000;
  const newId = () => ++nextId;

  const DEF_TASKS = [
    {id:101,title:'ポートフォリオに「言葉の瓶」追加',cat:3,due:'2026-03-23',dueTime:'23:59',done:false,subtasks:[],memo:'',urgentDays:2},
    {id:102,title:'授賞式の交通手段確認',cat:5,due:'2026-03-25',dueTime:'23:59',done:false,subtasks:[],memo:'',urgentDays:2},
    {id:103,title:'DaVinci カラグレ書き出し確認',cat:3,due:'2026-03-24',dueTime:'23:59',done:false,subtasks:[],memo:'',urgentDays:2},
    {id:104,title:'4年次ゼミ希望届提出',cat:2,due:'2026-04-02',dueTime:'12:00',done:false,subtasks:[],memo:'',urgentDays:2},
    {id:105,title:'ES提出 (A社)',cat:2,due:'2026-04-08',dueTime:'23:59',done:false,subtasks:[],memo:'',urgentDays:2},
    {id:106,title:'シフト来月分提出',cat:1,due:'2026-03-28',dueTime:'23:59',done:false,subtasks:[],memo:'',urgentDays:2},
  ];
  const DEF_EVENTS = [
    {id:1,title:'Blender アニメーション作業',cat:3,date:'2026-03-26',start:'13:00',end:'16:00'},
    {id:2,title:'映像基礎演習',cat:2,date:'2026-03-27',start:'10:00',end:'12:00'},
    {id:3,title:'造形原論',cat:2,date:'2026-03-27',start:'13:00',end:'14:30'},
    {id:4,title:'CG演習',cat:2,date:'2026-03-28',start:'10:00',end:'12:00'},
    {id:5,title:'ACジャパン広告学生賞 授賞式',cat:5,date:'2026-03-26',start:'14:00',end:'17:00'},
  ];
  const DEF_SHIFTS = [
    {dow:3,start:'19:00',end:'23:00',on:true},
    {dow:6,start:'20:00',end:'24:00',on:true},
  ];

  let tasks, events, settings, defaultShifts, shiftOverrides;
  let selDate = new Date(TODAY);
  let baitoCalMo = new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  let selBaitoDate = null;
  let curFilter = 'all';
  let curTabIdx = 0;
  const TAB_ORDER = ['today','tasks','baito'];
  let dlOpen = true;
  let doneOpen = false;
  let doneTkOpen = false;
  let fibOpen = false;
  let fibCat = 1;
  let fibDate = fmt(TODAY);
  let fibType = 'task';

  function loadData() {
    tasks = JSON.parse(localStorage.getItem('tasks')||'null') ?? DEF_TASKS.map(t=>({...t,subtasks:[...(t.subtasks||[])]}));
    events = JSON.parse(localStorage.getItem('events')||'null') ?? DEF_EVENTS.map(e=>({...e}));
    settings = JSON.parse(localStorage.getItem('settings')||'null') ?? {theme:'auto',showBaito:true};
    defaultShifts = JSON.parse(localStorage.getItem('defaultShifts')||'null') ?? DEF_SHIFTS.map(s=>({...s}));
    shiftOverrides = JSON.parse(localStorage.getItem('shiftOverrides')||'{}');
  }
  function saveData() {
    localStorage.setItem('tasks',JSON.stringify(tasks));
    localStorage.setItem('events',JSON.stringify(events));
    localStorage.setItem('settings',JSON.stringify(settings));
    localStorage.setItem('defaultShifts',JSON.stringify(defaultShifts));
    localStorage.setItem('shiftOverrides',JSON.stringify(shiftOverrides));
  }

  function initTheme() { applyTheme(settings.theme); }
  function applyTheme(mode) {
    settings.theme = mode;
    const dark = mode==='dark' || (mode==='auto' && window.matchMedia('(prefers-color-scheme:dark)').matches);
    if(dark) document.documentElement.setAttribute('data-theme','dark');
    else document.documentElement.removeAttribute('data-theme');
    saveData();
    document.querySelectorAll('.s-theme-btn').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
  }

  function switchTab(name, e) {
    if(e) e.stopPropagation();
    const newIdx = TAB_ORDER.indexOf(name);
    if(newIdx===curTabIdx) return;
    const dir = newIdx > curTabIdx ? 1 : -1;
    const curPage = document.getElementById('pg-'+TAB_ORDER[curTabIdx]);
    const newPage = document.getElementById('pg-'+name);

    newPage.style.display='block';
    newPage.style.position='absolute';
    newPage.style.top='0';
    newPage.style.left='0';
    newPage.style.width='100%';
    newPage.style.transform=`translateX(${dir*100}%)`;
    newPage.style.opacity='0';
    newPage.style.transition='none';

    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        const T='transform 0.2s ease-out,opacity 0.2s ease-out';
        curPage.style.transition=T;
        newPage.style.transition=T;
        curPage.style.transform=`translateX(${-dir*100}%)`;
        curPage.style.opacity='0';
        newPage.style.transform='translateX(0)';
        newPage.style.opacity='1';
      });
    });

    setTimeout(()=>{
      curPage.style.display='none';
      curPage.style.transform='';
      curPage.style.opacity='';
      curPage.style.transition='';
      curPage.style.position='';
      curPage.style.top='';
      curPage.style.left='';
      curPage.style.width='';
      newPage.style.transition='';
      newPage.style.position='';
      newPage.style.top='';
      newPage.style.left='';
      newPage.style.width='';
      renderTabContent(name);
    },220);

    curTabIdx=newIdx;
    document.querySelectorAll('.nv').forEach(n=>n.classList.toggle('on',n.dataset.tab===name));
    document.getElementById('hdrTitle').textContent={today:'今日',tasks:'タスク',baito:'バイト'}[name];
    closeFib();
  }

  function renderTabContent(name) {
    if(name==='today'){ renderDeadlines(); renderTodayTasks(); renderStrip(); renderTimeline(fmt(selDate)); }
    if(name==='tasks') renderTasksTab();
    if(name==='baito') renderBaito();
  }

  function renderAll() {
    renderTabContent(TAB_ORDER[curTabIdx]);
  }

  // ===== DEADLINES =====
  const chevUp = ()=>`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>`;
  const chevDown = ()=>`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>`;

  function toggleDl() {
    dlOpen=!dlOpen;
    const w=document.getElementById('dlWrap');
    if(dlOpen){ w.style.maxHeight='2000px'; }
    else { w.style.maxHeight='0'; }
    document.getElementById('dlTogBtn').innerHTML=dlOpen?chevUp():chevDown();
  }

  function renderDeadlines() {
    const el=document.getElementById('dlList');
    const list=tasks.filter(t=>!t.done&&t.due).sort((a,b)=>a.due.localeCompare(b.due));
    if(!list.length){
      el.innerHTML='<div style="padding:16px 0;text-align:center;font-size:16px;color:var(--tx2)">締め切りなし</div>';
      return;
    }
    el.innerHTML=list.map(t=>{
      const d=daysUntil(t.due);
      const over=d<0, urg=!over&&d<=(t.urgentDays??2);
      const badge=over
        ? `<span class="cat-tag" style="background:#ff3030">超過</span>`
        : `<span class="cat-tag c${t.cat}">${catName(t.cat)}</span>`;
      return `<div class="dl-card c${t.cat}${urg?' urg':''}" onclick="toggleDlDetail(${t.id})">
        <div class="dl-main">
          <div class="dl-num">
            <span class="dl-days">${over?'!':d}</span>
            <span class="dl-unit">${over?'超過':'日'}</span>
          </div>
          <div>
            <div class="dl-title">${esc(t.title)}</div>
            <div class="dl-meta">
              <span>${fmtDate(parseDate(t.due))}</span>
              <span class="dl-time"> ${t.dueTime||''}</span>
            </div>
          </div>
          ${badge}
        </div>
        <div class="dl-detail" id="dld-${t.id}">
          <div class="detail-sep"></div>
          ${buildTaskDetailForm(t,'dl')}
        </div>
      </div>`;
    }).join('');
  }

  function toggleDlDetail(id) {
    document.getElementById('dld-'+id)?.classList.toggle('open');
  }

  function buildTaskDetailForm(t, prefix) {
    const catChips=[1,2,3,4,5].map(c=>
      `<button class="cat-chip c${c}${t.cat===c?' sel':''}"
        onclick="event.stopPropagation();updateTaskField(${t.id},'cat',${c});renderAll()">
        ${catName(c)}
      </button>`).join('');
    const pfx=prefix||'x';
    return `
      <input class="detail-input" type="text" value="${esc(t.title)}" placeholder="タイトル"
        oninput="updateTaskField(${t.id},'title',this.value)" onclick="event.stopPropagation()">
      <div class="detail-row">
        <input class="detail-date" type="date" value="${t.due||''}"
          onchange="updateTaskField(${t.id},'due',this.value);renderAll()" onclick="event.stopPropagation()">
        <input class="detail-time" type="time" value="${t.dueTime||'23:59'}"
          onchange="updateTaskField(${t.id},'dueTime',this.value)" onclick="event.stopPropagation()">
      </div>
      <div class="cat-chips">${catChips}</div>
      <textarea class="detail-textarea" rows="3" placeholder="メモ"
        oninput="updateTaskField(${t.id},'memo',this.value)" onclick="event.stopPropagation()">${esc(t.memo||'')}</textarea>
      <div class="urg-slider-row">
        <div class="urg-slider-label">
          <span>緊急表示</span>
          <span id="urgL-${t.id}-${pfx}">${t.urgentDays??2}日前から</span>
        </div>
        <input type="range" min="1" max="7" value="${t.urgentDays??2}"
          oninput="updateTaskField(${t.id},'urgentDays',+this.value);var el=document.getElementById('urgL-${t.id}-${pfx}');if(el)el.textContent=this.value+'日前から'"
          onclick="event.stopPropagation()">
      </div>
      <button class="del-btn" onclick="event.stopPropagation();deleteTask(${t.id})">削除</button>
    `;
  }

  function updateTaskField(id, key, val) {
    const t=tasks.find(x=>x.id===id); if(!t) return;
    t[key]=val; saveData();
  }
  function deleteTask(id) {
    if(!confirm('削除しますか？')) return;
    tasks=tasks.filter(t=>t.id!==id); saveData(); renderAll();
  }

  // ===== TODAY TASKS =====
  function renderTodayTasks() {
    const el=document.getElementById('ttList');
    const weekEnd=new Date(TODAY); weekEnd.setDate(TODAY.getDate()+7);
    const weekEndStr=fmt(weekEnd);
    const active=tasks.filter(t=>!t.done&&t.due&&t.due<=weekEndStr).sort((a,b)=>a.due.localeCompare(b.due));
    const done=tasks.filter(t=>t.done);

    let html=active.map(t=>renderTtRow(t)).join('');
    html+=`<div class="done-hdr" onclick="toggleDoneSection('done','doneCaret')">
      完了 (${done.length})
      <svg id="doneCaret" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform 0.2s;${doneOpen?'transform:rotate(180deg)':''}"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="done-list${doneOpen?' open':''}" id="done">
      ${done.map(t=>renderTtRow(t,true)).join('')}
    </div>`;
    el.innerHTML=html;
  }

  function toggleDoneSection(listId, caretId) {
    doneOpen=!doneOpen;
    document.getElementById(listId)?.classList.toggle('open',doneOpen);
    const c=document.getElementById(caretId);
    if(c) c.style.transform=doneOpen?'rotate(180deg)':'';
  }

  function renderTtRow(t, isDone=false) {
    const d=daysUntil(t.due);
    const over=d<0, urg=!isDone&&!over&&d<=(t.urgentDays??2);
    const badgeClass=over?'over':urg?'urg':'';
    const badgeText=over?'超過':d+'日';
    const prog=t.subtasks?.length?`<span class="prog">${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length}</span>`:'';
    const subRows=(t.subtasks||[]).map(s=>`
      <div class="sub-row">
        <div class="sub-chk${s.done?' done':''}" onclick="toggleSub(${t.id},${s.id})"></div>
        <div class="sub-title${s.done?' done':''}">${esc(s.text)}</div>
      </div>`).join('');
    return `
      <div class="tt-row c${t.cat}${isDone?' done-row':''}" data-id="${t.id}" onclick="toggleTtExpand(${t.id})">
        <div class="tt-chk${t.done?' done':''} c${t.cat}" onclick="event.stopPropagation();doToggleTask(${t.id})"></div>
        <div>
          <div class="tt-title">${esc(t.title)} ${prog}</div>
          <div class="tt-sub">${fmtDate(parseDate(t.due))} ${t.dueTime||''} · ${catName(t.cat)}</div>
        </div>
        <div class="tt-badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="tt-subs" id="ttS-${t.id}">
        ${subRows}
        <button class="add-sub-btn" onclick="startAddSub(${t.id},'ttS-${t.id}')">+ サブタスク</button>
      </div>
      <div class="tt-detail" id="ttD-${t.id}">
        <div class="detail-sep"></div>
        ${buildTaskDetailForm(t,'tt')}
      </div>`;
  }

  function toggleTtExpand(id) {
    document.getElementById('ttS-'+id)?.classList.toggle('open');
    document.getElementById('ttD-'+id)?.classList.toggle('open');
  }

  function doToggleTask(id) {
    const t=tasks.find(x=>x.id===id); if(!t) return;
    if(t.done){ t.done=false; saveData(); renderAll(); return; }
    const row=document.querySelector(`.tt-row[data-id="${id}"]`);
    if(row) {
      const chk=row.querySelector('.tt-chk');
      chk.classList.add('done');
      chk.style.animation='chkPop 0.15s ease-out';
      row.style.background='rgba(80,200,80,.15)';
      row.style.transition='background 0.15s';
      setTimeout(()=>{
        row.style.background='';
        setTimeout(()=>{
          row.style.transition='opacity 0.2s ease-out,transform 0.2s ease-out';
          row.style.opacity='0';
          row.style.transform='translateY(10px)';
          setTimeout(()=>{ t.done=true; saveData(); renderAll(); },200);
        },300);
      },150);
    } else { t.done=true; saveData(); renderAll(); }
  }

  function toggleSub(parentId, subId) {
    const t=tasks.find(x=>x.id===parentId); if(!t) return;
    const s=t.subtasks.find(x=>x.id===subId);
    if(s){ s.done=!s.done; saveData(); renderAll(); }
  }

  function startAddSub(parentId, containerId) {
    const container=document.getElementById(containerId); if(!container) return;
    container.classList.add('open');
    const inp=document.createElement('input');
    inp.style.cssText='width:100%;height:48px;border:none;border-radius:16px;background:var(--bg0);font-size:16px;font-weight:500;color:var(--tx1);padding:0 16px;font-family:inherit;margin:4px 0;outline:none;display:block';
    inp.placeholder='サブタスクを入力...';
    const addBtn=container.querySelector('.add-sub-btn');
    container.insertBefore(inp,addBtn);
    inp.focus();
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'&&inp.value.trim()){
        const t=tasks.find(x=>x.id===parentId);
        if(t){ t.subtasks.push({id:newId(),text:inp.value.trim(),done:false}); saveData(); renderAll(); }
      }
      if(e.key==='Escape') inp.remove();
    });
    inp.addEventListener('blur',()=>setTimeout(()=>{ if(inp.parentNode) inp.remove(); },200));
  }

  // ===== SCHEDULE STRIP & TIMELINE =====
  function renderStrip() {
    const el=document.getElementById('strip');
    const cells=[];
    const catColors=['','#d4a020','#c86030','#509830','#2878b8','#8048a0'];
    for(let i=-3;i<=14;i++) {
      const d=new Date(TODAY); d.setDate(TODAY.getDate()+i);
      const ds=fmt(d), isT=i===0, isSel=ds===fmt(selDate)&&!isT;
      const evts=getEventsForDay(ds);
      const dotColors=[...new Set(evts.map(e=>e.cat))].slice(0,3);
      const dots=dotColors.map(c=>`<div class="sd-dot" style="background:${catColors[c]||'#888'}"></div>`).join('');
      cells.push(`<div class="sd-cell${isT?' today-c':''}${isSel?' sel-c':''}" onclick="selectDate('${ds}')">
        <div class="sd-dow">${DOW[d.getDay()]}</div>
        <div class="sd-num">${d.getDate()}</div>
        <div class="sd-dots">${dots}</div>
      </div>`);
    }
    el.innerHTML=cells.join('');
    const tc=el.querySelector('.today-c');
    if(tc) tc.scrollIntoView({inline:'center',block:'nearest'});
  }

  function selectDate(ds) {
    selDate=parseDate(ds);
    renderStrip();
    renderTimeline(ds);
  }

  function getEventsForDay(ds) {
    const base=events.filter(e=>e.date===ds);
    const baito=getBaitoForDay(parseDate(ds));
    let all=[...base,...baito];
    if(!settings.showBaito) all=all.filter(e=>e.cat!==1);
    const seen=new Set();
    return all.filter(e=>{
      const k=e.title+e.start;
      if(seen.has(k)) return false;
      seen.add(k);
      return true;
    }).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  }

  function getBaitoForDay(d) {
    const ds=fmt(d), dw=d.getDay(), ov=shiftOverrides[ds];
    if(ov?.type==='off') return [];
    if(ov?.type==='change'||ov?.type==='add') return [{id:'bov-'+ds,title:'バイト',cat:1,date:ds,start:ov.start,end:ov.end}];
    const df=defaultShifts.find(s=>s.dow===dw&&s.on);
    if(df) return [{id:'bdf-'+ds,title:'バイト',cat:1,date:ds,start:df.start,end:df.end}];
    return [];
  }

  function renderTimeline(ds) {
    const el=document.getElementById('tlToday');
    const evts=getEventsForDay(ds);
    if(!evts.length){ el.innerHTML='<div class="tl-empty">予定なし</div>'; return; }
    el.innerHTML=evts.map(ev=>`
      <div class="tb">
        <div class="tb-time">${ev.start||''}</div>
        <div class="tb-ev c${ev.cat}">
          <div class="tb-dot"></div>
          <div>
            <div class="tb-ev-t">${esc(ev.title)}</div>
            <div class="tb-ev-sub">${ev.start||''}${ev.end?' — '+ev.end:''}</div>
          </div>
          <div class="tb-dur">${durStr(ev.start,ev.end)}</div>
        </div>
      </div>`).join('');
  }

  // ===== TASKS TAB =====
  function setFilter(f) {
    curFilter=f;
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('on',c.dataset.cat===f));
    renderTasksTab();
  }

  function renderTasksTab() {
    const el=document.getElementById('tkList');
    let list=tasks.filter(t=>!t.done);
    if(curFilter!=='all') list=list.filter(t=>String(t.cat)===curFilter);
    list.sort((a,b)=>(a.due||'').localeCompare(b.due||''));
    const doneList=tasks.filter(t=>t.done&&(curFilter==='all'||String(t.cat)===curFilter));
    let html=list.map(t=>renderTkCard(t)).join('');
    html+=`<div class="done-hdr" style="padding:16px 24px" onclick="toggleDoneTk()">
      完了 (${doneList.length})
      <svg id="doneTkCaret" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform 0.2s;${doneTkOpen?'transform:rotate(180deg)':''}"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="done-list${doneTkOpen?' open':''}" id="doneTkList">
      ${doneList.map(t=>renderTkCard(t,true)).join('')}
    </div>`;
    el.innerHTML=html;
  }

  function toggleDoneTk() {
    doneTkOpen=!doneTkOpen;
    document.getElementById('doneTkList')?.classList.toggle('open',doneTkOpen);
    const c=document.getElementById('doneTkCaret');
    if(c) c.style.transform=doneTkOpen?'rotate(180deg)':'';
  }

  function renderTkCard(t, isDone=false) {
    const d=daysUntil(t.due);
    const over=d<0, urg=!isDone&&!over&&d<=(t.urgentDays??2);
    const badgeClass=over?'over':urg?'urg':'';
    const badgeText=over?'超過':d+'日';
    const prog=t.subtasks?.length?`<span class="prog">${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length}</span>`:'';
    const subRows=(t.subtasks||[]).map(s=>`
      <div class="sub-row">
        <div class="sub-chk${s.done?' done':''}" onclick="toggleSub(${t.id},${s.id})"></div>
        <div class="sub-title${s.done?' done':''}">${esc(s.text)}</div>
      </div>`).join('');
    return `<div class="tk-card c${t.cat}" data-id="${t.id}">
      <div class="tk-main" onclick="toggleTkExpand(${t.id})">
        <div class="tt-chk${t.done?' done':''} c${t.cat}" onclick="event.stopPropagation();doToggleTask(${t.id})"></div>
        <div>
          <div class="tt-title">${esc(t.title)} ${prog}</div>
          <div class="tt-sub">${t.due?fmtDate(parseDate(t.due)):''} ${t.dueTime||''} · ${catName(t.cat)}</div>
        </div>
        <div class="tt-badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="tk-subs" id="tkS-${t.id}" style="padding:0 12px">
        ${subRows}
        <button class="add-sub-btn" onclick="startAddSub(${t.id},'tkS-${t.id}')">+ サブタスク</button>
      </div>
      <div class="tk-detail" id="tkD-${t.id}">
        <div class="detail-sep"></div>
        ${buildTaskDetailForm(t,'tk')}
      </div>
    </div>`;
  }

  function toggleTkExpand(id) {
    document.getElementById('tkS-'+id)?.classList.toggle('open');
    document.getElementById('tkD-'+id)?.classList.toggle('open');
  }

  // ===== BAITO TAB =====
  function renderBaito() {
    renderBaitoShifts();
    renderBaitoStats();
    renderBaitoCal();
  }

  function renderBaitoShifts() {
    const el=document.getElementById('shiftList');
    el.innerHTML=defaultShifts.map((s,i)=>`
      <div class="shift-row">
        <div class="shift-dow">${DOW[s.dow]}</div>
        <div class="shift-time">${s.start} — ${s.end}</div>
        <button class="tog-sw${s.on?' on':''}" onclick="toggleShift(${i})"></button>
      </div>`).join('');
  }

  function toggleShift(i) { defaultShifts[i].on=!defaultShifts[i].on; saveData(); renderBaito(); }

  function renderBaitoStats() {
    const el=document.getElementById('baitoStats');
    const yr=baitoCalMo.getFullYear(), mo=baitoCalMo.getMonth();
    const dm=new Date(yr,mo+1,0).getDate();
    let days=0, mins=0;
    for(let d=1;d<=dm;d++) {
      const dt=new Date(yr,mo,d);
      const evts=getBaitoForDay(dt);
      if(evts.length){
        days++;
        evts.forEach(e=>{
          if(e.start&&e.end){
            const [sh,sm]=e.start.split(':').map(Number),[eh,em]=e.end.split(':').map(Number);
            mins+=(eh*60+em)-(sh*60+sm);
          }
        });
      }
    }
    const h=Math.floor(mins/60), m=mins%60;
    el.innerHTML=`
      <div><div class="stat-num">${days}</div><div class="stat-lbl">出勤日数</div></div>
      <div><div class="stat-num">${h}h${m?m+'m':''}</div><div class="stat-lbl">合計時間</div></div>`;
  }

  function renderBaitoCal() {
    const yr=baitoCalMo.getFullYear(), mo=baitoCalMo.getMonth();
    document.getElementById('calMonth').textContent=`${yr}年${mo+1}月`;
    const el=document.getElementById('calGrid');
    const first=new Date(yr,mo,1).getDay(), dm=new Date(yr,mo+1,0).getDate();
    let html=DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
    for(let i=0;i<first;i++) html+=`<div class="cal-day other-mo"></div>`;
    for(let d=1;d<=dm;d++) {
      const dt=new Date(yr,mo,d), ds=fmt(dt);
      const isT=fmt(dt)===fmt(TODAY), isSel=selBaitoDate===ds;
      const hasBaito=getBaitoForDay(dt).length>0;
      html+=`<div class="cal-day${isT?' today-d':''}${isSel&&!isT?' sel-d':''}" onclick="selectBaitoDate('${ds}')">
        ${d}${hasBaito?'<div class="cal-day-dot"></div>':''}
      </div>`;
    }
    el.innerHTML=html;
    renderBaitoAction();
  }

  function selectBaitoDate(ds) { selBaitoDate=ds; renderBaitoCal(); }
  function prevBaitoMo() { baitoCalMo=new Date(baitoCalMo.getFullYear(),baitoCalMo.getMonth()-1,1); renderBaito(); }
  function nextBaitoMo() { baitoCalMo=new Date(baitoCalMo.getFullYear(),baitoCalMo.getMonth()+1,1); renderBaito(); }

  function renderBaitoAction() {
    const el=document.getElementById('baitoAction');
    if(!selBaitoDate){ el.style.display='none'; return; }
    el.style.display='block';
    const d=parseDate(selBaitoDate), dw=d.getDay();
    const df=defaultShifts.find(s=>s.dow===dw&&s.on);
    const ov=shiftOverrides[selBaitoDate];
    const curType=ov?.type||(df?'normal':'none');
    const showTime=curType==='change'||curType==='add';
    el.innerHTML=`
      <div class="baito-action-title">${fmtDate(d)}</div>
      <div class="baito-action-btns">
        ${df
          ?`<button class="baito-act-btn${curType==='normal'?' on':''}" onclick="setBaitoOv('${selBaitoDate}','normal')">通常</button>
            <button class="baito-act-btn${curType==='off'?' on':''}" onclick="setBaitoOv('${selBaitoDate}','off')">休み</button>
            <button class="baito-act-btn${curType==='change'?' on':''}" onclick="setBaitoOv('${selBaitoDate}','change')">変更</button>`
          :`<button class="baito-act-btn${curType==='add'?' on':''}" onclick="setBaitoOv('${selBaitoDate}','add')">追加</button>
            <button class="baito-act-btn${curType==='off'?' on':''}" onclick="setBaitoOv('${selBaitoDate}','off')">なし</button>`
        }
      </div>
      ${showTime?`<div class="time-inputs">
        <input class="time-inp" type="time" id="bOvS" value="${ov?.start||(df?.start||'09:00')}" onchange="saveBaitoTime('${selBaitoDate}')">
        <input class="time-inp" type="time" id="bOvE" value="${ov?.end||(df?.end||'17:00')}" onchange="saveBaitoTime('${selBaitoDate}')">
      </div>`:''}
    `;
  }

  function setBaitoOv(ds, type) {
    if(type==='normal') delete shiftOverrides[ds];
    else {
      if(!shiftOverrides[ds]) shiftOverrides[ds]={type,start:'',end:''};
      else shiftOverrides[ds].type=type;
    }
    saveData(); renderBaito();
  }
  function saveBaitoTime(ds) {
    const s=document.getElementById('bOvS'), e=document.getElementById('bOvE');
    if(!shiftOverrides[ds]) shiftOverrides[ds]={type:'change',start:'',end:''};
    if(s) shiftOverrides[ds].start=s.value;
    if(e) shiftOverrides[ds].end=e.value;
    saveData();
  }

  // ===== FIB =====
  function openFib() {
    if(fibOpen) return;
    fibOpen=true;
    const inp=document.getElementById('fibInput');
    inp.removeAttribute('readonly');
    document.getElementById('fibPanel').classList.add('open');
    document.getElementById('fibBd').classList.add('active');
    renderFibPanel();
    setTimeout(()=>inp.focus(),50);
  }
  function closeFib() {
    if(!fibOpen) return;
    fibOpen=false;
    document.getElementById('fibPanel').classList.remove('open');
    document.getElementById('fibBd').classList.remove('active');
    const inp=document.getElementById('fibInput');
    inp.value='';
    inp.setAttribute('readonly','');
  }
  function renderFibPanel() {
    const cats=[1,2,3,4,5].map(c=>
      `<button class="cat-chip c${c}${fibCat===c?' sel':''}" onclick="fibCat=${c};renderFibPanel()">${catName(c)}</button>`
    ).join('');
    const todayStr=fmt(TODAY);
    const tomStr=fmt(new Date(TODAY.getTime()+864e5));
    const datStr=fmt(new Date(TODAY.getTime()+2*864e5));
    const dateBtns=[
      [todayStr,'今日'],[tomStr,'明日'],[datStr,'明後日']
    ].map(([ds,lbl])=>`<button class="fib-date-btn${fibDate===ds?' on':''}" onclick="fibDate='${ds}';renderFibPanel()">${lbl}</button>`).join('');
    const isCustom=fibDate!==todayStr&&fibDate!==tomStr&&fibDate!==datStr;
    document.getElementById('fibPanel').innerHTML=`
      <div class="fib-cat-chips">${cats}</div>
      <div class="fib-date-btns">
        ${dateBtns}
        <button class="fib-date-btn${isCustom?' on':''}" onclick="document.getElementById('fibDatePick').click()">指定</button>
        <input type="date" id="fibDatePick" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0" value="${fibDate}" onchange="fibDate=this.value;renderFibPanel()">
      </div>
      <div class="fib-time-row">
        <span class="fib-time-label">時刻</span>
        <input class="fib-time-input" type="time" id="fibTime" value="23:59">
      </div>
      <div class="fib-type-row">
        <button class="fib-type-btn${fibType==='task'?' on':''}" onclick="fibType='task';renderFibPanel()">タスク</button>
        <button class="fib-type-btn${fibType==='event'?' on':''}" onclick="fibType='event';renderFibPanel()">予定</button>
      </div>
      <button class="fib-add-btn" onclick="submitFib()">追加</button>
    `;
  }
  function submitFib() {
    const title=document.getElementById('fibInput').value.trim(); if(!title) return;
    const time=document.getElementById('fibTime')?.value||'23:59';
    if(fibType==='task') tasks.push({id:newId(),title,cat:fibCat,due:fibDate,dueTime:time,done:false,subtasks:[],memo:'',urgentDays:2});
    else events.push({id:newId(),title,cat:fibCat,date:fibDate,start:time,end:null});
    saveData(); renderAll(); closeFib();
  }

  // ===== SETTINGS =====
  function openSettings() {
    document.getElementById('sBd').classList.add('open');
    document.getElementById('sPan').classList.add('open');
    document.querySelectorAll('.s-theme-btn').forEach(b=>b.classList.toggle('on',b.dataset.mode===settings.theme));
    document.getElementById('baitoTog').classList.toggle('on',settings.showBaito);
  }
  function closeSettings() {
    document.getElementById('sBd').classList.remove('open');
    document.getElementById('sPan').classList.remove('open');
  }
  function setTheme(m) { applyTheme(m); }
  function toggleBaitoSetting() {
    settings.showBaito=!settings.showBaito; saveData(); renderAll();
    document.getElementById('baitoTog').classList.toggle('on',settings.showBaito);
  }

  // ===== INIT =====
  (function init(){
    loadData();
    initTheme();
    document.getElementById('hdrDate').textContent=fmtDate(TODAY);
    const dlWrap=document.getElementById('dlWrap');
    dlWrap.style.transition='max-height 0.2s ease-out';
    dlWrap.style.overflow='hidden';
    dlWrap.style.maxHeight='2000px';
    renderDeadlines();
    renderTodayTasks();
    renderStrip();
    renderTimeline(fmt(TODAY));
    document.getElementById('fibInput').setAttribute('readonly','');
    window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{
      if(settings.theme==='auto') applyTheme('auto');
    });
  })();
  </script>
</body>
</html>
